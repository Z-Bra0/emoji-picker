<head>
  <meta charset="UTF-8" />

  <title>Emoji Picker</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { scroll-behavior: smooth; }
    .emoji-btn {
      font-size: 1.6rem;
      line-height: 1;
      cursor: pointer;
      border-radius: 0.5rem;
      padding: 0.35rem;
      transition: background 0.1s, transform 0.1s;
      border: none;
      background: transparent;
      user-select: none;
    }
    .emoji-btn:hover {
      background: oklch(var(--b2));
      transform: scale(1.2);
      position: relative;
      z-index: 50;
    }
    .emoji-btn:active { transform: scale(0.95); }
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      pointer-events: none;
    }
    .category-section { scroll-margin-top: 7rem; }
  </style>
</head>
<body class="bg-base-100 min-h-screen">

  </div>

  </div>

categories.forEach((cat, i) => {
  // Tab
  const tab = document.createElement('a');
  tab.className = 'tab tab-bordered' + (i === 0 ? ' tab-active' : '');
  tab.textContent = cat;
  tab.href = `#cat-${cat}`;
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
    tab.classList.add('tab-active');
  });
  tabsContainer.appendChild(tab);

  // Section
  const section = document.createElement('section');
  section.className = 'category-section mb-8';
  section.id = `cat-${cat}`;

  const heading = document.createElement('h2');
  heading.className = 'text-sm font-semibold text-base-content/50 uppercase tracking-widest mb-3 pt-2';
  heading.textContent = cat;
  section.appendChild(heading);

  const grid = document.createElement('div');
  grid.className = 'flex flex-wrap gap-0.5';

  EMOJIS[cat].forEach(item => {
    grid.appendChild(makeEmojiBtn(item));
  });

  section.appendChild(grid);
  categoriesContainer.appendChild(section);
});

function makeEmojiBtn({ e, n }) {
  const btn = document.createElement('button');
  btn.className = 'emoji-btn tooltip tooltip-bottom';
  btn.setAttribute('data-tip', n);
  btn.setAttribute('aria-label', n);
  btn.textContent = e;
  btn.addEventListener('click', () => copyEmoji(e, n));
  return btn;
}

// Search
const searchInput = document.getElementById('search');
const clearBtn = document.getElementById('clear-btn');
const searchResults = document.getElementById('search-results');
const searchGrid = document.getElementById('search-grid');
const noResults = document.getElementById('no-results');
const categoriesView = document.getElementById('categories-container');
const categoryTabsEl = document.getElementById('category-tabs');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  clearBtn.classList.toggle('hidden', !q);

  if (!q) {
    searchResults.classList.add('hidden');
    categoriesView.classList.remove('hidden');
    categoryTabsEl.classList.remove('hidden');
    return;
  }

  searchResults.classList.remove('hidden');
  categoriesView.classList.add('hidden');
  categoryTabsEl.classList.add('hidden');
  searchGrid.innerHTML = '';

  const matched = [];
  categories.forEach(cat => {
    EMOJIS[cat].forEach(item => {
      if (item.n.toLowerCase().includes(q) || item.e.includes(q)) {
        matched.push(item);
      }
    });
  });

  // Deduplicate by emoji character
  const seen = new Set();
  const unique = matched.filter(item => {
    if (seen.has(item.e)) return false;
    seen.add(item.e);
    return true;
  });

  noResults.classList.toggle('hidden', unique.length > 0);

  unique.forEach(item => {
    searchGrid.appendChild(makeEmojiBtn(item));
  });
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchInput.dispatchEvent(new Event('input'));
  searchInput.focus();
});

// Copy to clipboard
function copyEmoji(emoji, name) {
  navigator.clipboard.writeText(emoji).then(() => {
    showToast(emoji, name);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = emoji;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(emoji, name);
  });
}

let toastTimer;
function showToast(emoji, name) {
  const container = document.getElementById('toast-container');
  container.innerHTML = '';
  const alert = document.createElement('div');
  alert.className = 'alert alert-success shadow-lg py-2 px-4 flex items-center gap-2 text-sm';
  alert.innerHTML = `<span style="font-size:1.4rem">${emoji}</span><span><strong>${name}</strong> copied!</span>`;
  container.appendChild(alert);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { container.innerHTML = ''; }, 2000);
}

// Dark mode toggle
const themeToggle = document.getElementById('theme-toggle');
themeToggle.addEventListener('change', () => {
  document.documentElement.setAttribute('data-theme', themeToggle.checked ? 'dark' : 'light');
});

// Highlight active tab on scroll
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      const catName = id.replace('cat-', '');
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('tab-active', t.textContent === catName);
      });
    }
  });
}, { rootMargin: '-30% 0px -60% 0px' });

document.querySelectorAll('.category-section').forEach(sec => observer.observe(sec));
</script>
